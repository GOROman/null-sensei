<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — Null-sensei</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <a href="/" class="logo">Null-sensei</a>
    <nav>
      <a href="/news/">News</a>
      <a href="/blog/">Blog</a>
    </nav>
  </header>

  <div class="container">
    <h2 class="page-title">Blog</h2>
    <ul class="post-list" id="blog-list">
      <!-- ナルエビが自動生成 -->
    </ul>
  </div>

  <footer>
    <p>by <a href="https://x.com/GOROman" target="_blank">@GOROman</a> &amp; <a href="https://x.com/naruevi" target="_blank">ナルエビ🦐</a></p>
  </footer>

  <script>
    fetch('/blog/index.json')
      .then(r => r.json())
      .then(posts => {
        const list = document.getElementById('blog-list');
        posts.forEach(p => {
          list.innerHTML += `
            <li class="post-item">
              <div class="post-date">${p.date}</div>
              <a class="post-title" href="/blog/${p.slug}/">${p.title}</a>
              <p class="post-excerpt">${p.excerpt}</p>
            </li>`;
        });
      });
  </script>
</body>
</html>
